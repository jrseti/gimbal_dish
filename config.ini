# Gimbal Control Configuration

# Motor Driver Pin Configuration (BCM numbering)
[motor_pins]
motor1_pwm = 12
motor1_dir = 5
motor1_en = 22
motor2_pwm = 13
motor2_dir = 6
motor2_en = 23

# PID Controller Parameters
[pid_azimuth]
kp = 1.0
ki = 0.1
kd = 0.05

[pid_tilt]
kp = 1.0
ki = 0.1
kd = 0.05

# Control Loop Settings
[control]
update_rate_hz = 10
motor_speed_limit = 100

# Sensor Settings
[sensors]
# ADXL345 I2C address (default is 0x53)
adxl345_address = 0x53
# MMC5603 I2C address (default is 0x30)
mmc5603_address = 0x30
